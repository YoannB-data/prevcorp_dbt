version: 2

models:
  - name: fct__dossiers
    description: |
      **Ce que c'est :** Dossiers de sinistres avec leur contexte complet : identité de l'assuré, entreprise employeur, contrat et segment.
      **Grain :** Une ligne = un dossier de sinistre.
      **À qui ça s'adresse :** Agent text-to-SQL et analyses de sinistralité (fréquence, durée, répartition par risque, par segment, par entreprise).
      **Sources :** `int__dossiers_enrichis` (lui-même issu de `stg_prevcorp__dossiers`, `stg_prevcorp__assures`, `stg_prevcorp__entreprises`, `stg_prevcorp__contrats`, `stg_prevcorp__segments`).
      **Exceptions :** `duree_dossier_jours` est calculée jusqu'au 31/12/2025 pour les dossiers en cours, et jusqu'à `etat_date` pour les dossiers clos.

    columns:
      - name: dossier_id
        description: Identifiant unique du dossier de sinistre.
        tests:
          - unique
          - not_null

      - name: dossier_numero
        description: Numéro de dossier tel qu'il figure dans le système de gestion.
        tests:
          - not_null

      - name: assure_id
        description: Identifiant de l'assuré concerné par le dossier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_prevcorp__assures')
                field: assure_id

      - name: contrat_id
        description: Identifiant du contrat sous lequel le dossier a été ouvert.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_prevcorp__contrats')
                field: contrat_id

      - name: entreprise_id
        description: Identifiant de l'entreprise employant l'assuré au moment du sinistre.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_prevcorp__entreprises')
                field: entreprise_id

      - name: risque
        description: |
          Nature du risque couvert par le dossier.
          Incapacité = arrêt de travail. Invalidité = incapacité permanente. Décès = capital versé aux bénéficiaires désignés. Rente viagère = rente versée au conjoint survivant. Rente éducation = rente versée aux enfants du défunt.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Incapacité", "Invalidité", "Décès", "Rente viagère", "Rente éducation"]

      - name: nature_arret
        description: |
          Cause médicale ou juridique de l'arrêt à l'origine du dossier. NULL pour les dossiers Décès et rentes.
          Maladie = maladie ordinaire. Accident travail = accident sur le lieu de travail. Accident de trajet = accident sur le trajet domicile-travail. Maladie Professionnelle = maladie d'origine professionnelle reconnue. Maternité = congé maternité.
        tests:
          - accepted_values:
              arguments:
                values: ["Maladie", "Accident travail", "Accident de trajet", "Maladie Professionnelle", "Maternité"]

      - name: salaire_montant
        description: Salaire de référence de l'assuré au moment de l'ouverture du dossier, en euros annuels bruts. Sert de base au calcul des prestations d'incapacité et d'invalidité.
        tests:
          - not_null

      - name: creation_date
        description: Date d'ouverture du dossier dans le système de gestion.
        tests:
          - not_null

      - name: fait_generateur_date
        description: Date du sinistre initial.
        tests:
          - not_null

      - name: etat_date
        description: Date de la dernière mise à jour du statut du dossier. NULL si le dossier n'a jamais changé d'état depuis son ouverture.

      - name: etat_motif
        description: |
          Motif de clôture du dossier. NULL tant que le dossier est en cours.
          SANS SUITE = dossier classé sans indemnisation. RETRAITE = assuré parti à la retraite. REPRISE TRAVAIL = assuré ayant repris une activité professionnelle. DECEDE = assuré décédé en cours de dossier.
        tests:
          - accepted_values:
              arguments:
                values: ["SANS SUITE", "RETRAITE", "REPRISE TRAVAIL", "DECEDE"]

      - name: est_en_cours
        description: Indique si le dossier est toujours actif et donne lieu à des prestations en cours de versement.
        tests:
          - not_null

      - name: attest_non_activite_date
        description: Date de réception de l'attestation de non-activité fournie par l'assuré. NULL si le document n'a pas encore été reçu. Applicable uniquement aux dossiers Invalidité.

      - name: justif_ss_date
        description: Date de réception du justificatif Sécurité Sociale. NULL si le document n'a pas encore été reçu. Applicable uniquement aux dossiers Invalidité.

      - name: duree_dossier_jours
        description: Durée du dossier en jours. Pour un dossier clos, intervalle entre l'ouverture et la date de clôture. Pour un dossier en cours, intervalle entre l'ouverture et le 31 décembre 2025, date de fin de couverture du dataset.
        tests:
          - not_null

      - name: assure_nom
        description: Nom de famille de l'assuré.

      - name: assure_prenom
        description: Prénom de l'assuré.

      - name: pays_code
        description: Code ISO du pays de résidence de l'assuré (ex. FR, DE, MA).

      - name: entreprise_nom
        description: Raison sociale de l'entreprise employant l'assuré au moment du sinistre.

      - name: entreprise_est_en_cours
        description: Indique si l'entreprise est toujours active dans le portefeuille à la date d'aujourd'hui.

      - name: contrat_numero
        description: Numéro du contrat sous lequel le dossier a été ouvert.

      - name: contrat_type
        description: |
          Catégorie de personnel couverte par le contrat.
          CADRE = salariés cadres uniquement. NON CADRE = salariés non cadres uniquement. ENSEMBLE DU PERSONNEL = tous salariés confondus.
        tests:
          - accepted_values:
              arguments:
                values: ["CADRE", "NON CADRE", "ENSEMBLE DU PERSONNEL"]

      - name: segment_nom
        description: Libellé du segment de marché du contrat (ex. "Boucherie artisanale", "Enseignement privé").
