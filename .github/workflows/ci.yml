name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint + dbt build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: black — format check
        run: uv run black --check generate_dataset/generate.py

      - name: isort — import order check
        run: uv run isort --check generate_dataset/generate.py

      - name: pylint — score 10/10
        run: uv run pylint generate_dataset/generate.py --fail-under=10

      - name: Generate dataset
        run: uv run python generate_dataset/generate.py

      - name: Setup dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          prevcorp_dbt:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
                threads: 1
          EOF

      - name: dbt seed
        working-directory: prevcorp_dbt
        run: uv run dbt seed

      - name: dbt build
        working-directory: prevcorp_dbt
        run: uv run dbt build
